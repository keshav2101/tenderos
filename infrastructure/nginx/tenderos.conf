server {
    listen 80;
    server_name tenderos.in api.tenderos.in;

    # Redirect all HTTP to HTTPS
    return 301 https://$host$request_uri;
}

# ─── Frontend ───────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name tenderos.in www.tenderos.in;

    ssl_certificate     /etc/ssl/certs/tenderos.in.crt;
    ssl_certificate_key /etc/ssl/private/tenderos.in.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://api.tenderos.in wss://api.tenderos.in;" always;

    location / {
        proxy_pass         http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}

# ─── API Gateway ─────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name api.tenderos.in;

    ssl_certificate     /etc/ssl/certs/tenderos.in.crt;
    ssl_certificate_key /etc/ssl/private/tenderos.in.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;

    # Rate limiting at NGINX level (belt-and-suspenders)
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
    limit_req       zone=api_limit burst=60 nodelay;

    # Max request body for document upload (100MB)
    client_max_body_size 100M;

    location / {
        proxy_pass         http://localhost:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;

        # CORS handled by the gateway service itself
    }

    # WebSocket upgrade for streaming Copilot responses
    location /ws/ {
        proxy_pass         http://localhost:8000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_read_timeout 3600s;
    }
}

# ─── Grafana (internal — restrict to VPN IP range) ─────────
server {
    listen 443 ssl http2;
    server_name grafana.tenderos.in;

    ssl_certificate     /etc/ssl/certs/tenderos.in.crt;
    ssl_certificate_key /etc/ssl/private/tenderos.in.key;

    # Replace with actual VPN/office CIDR range
    allow 10.0.0.0/8;
    deny  all;

    location / {
        proxy_pass http://localhost:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
