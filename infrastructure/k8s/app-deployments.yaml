apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: tenderos/api-gateway:latest
          ports:
            - containerPort: 8000
          env:
            - name: POSTGRES_HOST
              value: "postgres"
            - name: REDIS_HOST
              value: "redis"
            - name: AUTH_SERVICE_URL
              value: "http://auth-service:8001"
            - name: TENDER_SERVICE_URL
              value: "http://tender-service:8002"
            - name: SEARCH_SERVICE_URL
              value: "http://search-service:8010"
            - name: BILLING_SERVICE_URL
              value: "http://billing-service:8020"
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
spec:
  ports:
    - port: 8000
  selector:
    app: api-gateway
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: tenderos/auth-service:latest
          ports:
            - containerPort: 8001
          env:
            - name: POSTGRES_HOST
              value: "postgres"
            - name: REDIS_HOST
              value: "redis"
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
spec:
  ports:
    - port: 8001
  selector:
    app: auth-service
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tender-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: tender-service
  template:
    metadata:
      labels:
        app: tender-service
    spec:
      containers:
        - name: tender-service
          image: tenderos/tender-service:latest
          ports:
            - containerPort: 8002
          env:
            - name: POSTGRES_HOST
              value: "postgres"
---
apiVersion: v1
kind: Service
metadata:
  name: tender-service
spec:
  ports:
    - port: 8002
  selector:
    app: tender-service
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: billing-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: billing-service
  template:
    metadata:
      labels:
        app: billing-service
    spec:
      containers:
        - name: billing-service
          image: tenderos/billing-service:latest
          ports:
            - containerPort: 8020
          env:
            - name: POSTGRES_HOST
              value: "postgres"
            - name: STRIPE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: stripe-secrets
                  key: api-key
            - name: STRIPE_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: stripe-secrets
                  key: webhook-secret
---
apiVersion: v1
kind: Service
metadata:
  name: billing-service
spec:
  ports:
    - port: 8020
  selector:
    app: billing-service
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: tenderos/frontend:latest
          ports:
            - containerPort: 3000
          env:
            - name: NEXT_PUBLIC_API_URL
              value: "http://api-gateway:8000"
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
spec:
  ports:
    - port: 3000
  selector:
    app: frontend
