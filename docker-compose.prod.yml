version: "3.9"

# ============================================================
# TenderOS v1.0.0 — PRODUCTION docker-compose
# Usage:
#   cp .env.production.template .env
#   # Fill in all secrets in .env
#   docker-compose -f docker-compose.prod.yml up -d
#   # Wait for all healthchecks to pass (approx 90s):
#   docker-compose -f docker-compose.prod.yml ps
#   # Seed demo data:
#   docker exec -i tenderos-postgres psql -U tenderos -d tenderos \
#     < infrastructure/postgres/seed_demo.sql
# ============================================================

networks:
  tenderos-net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  minio_data:
  opensearch_data:
  qdrant_data:
  neo4j_data:
  neo4j_logs:

# ─── Shared env anchors ──────────────────────────────────────
x-postgres-env: &postgres-env
  POSTGRES_HOST: postgres
  POSTGRES_PORT: "5432"
  POSTGRES_DB: ${POSTGRES_DB:-tenderos}
  POSTGRES_USER: ${POSTGRES_USER:-tenderos}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

x-redis-env: &redis-env
  REDIS_HOST: redis
  REDIS_PORT: "6379"
  REDIS_PASSWORD: ${REDIS_PASSWORD}

x-rabbitmq-env: &rabbitmq-env
  RABBITMQ_HOST: rabbitmq
  RABBITMQ_PORT: "5672"
  RABBITMQ_USER: ${RABBITMQ_USER:-tenderos}
  RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
  RABBITMQ_VHOST: tenderos

x-minio-env: &minio-env
  MINIO_ENDPOINT: minio:9000
  MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
  MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
  MINIO_BUCKET_DOCUMENTS: tender-documents
  MINIO_BUCKET_PROFILES: company-profiles
  MINIO_SECURE: "false"

x-opensearch-env: &opensearch-env
  OPENSEARCH_HOST: opensearch
  OPENSEARCH_PORT: "9200"

x-qdrant-env: &qdrant-env
  QDRANT_HOST: qdrant
  QDRANT_PORT: "6333"
  QDRANT_API_KEY: ${QDRANT_API_KEY}

x-neo4j-env: &neo4j-env
  NEO4J_URI: bolt://neo4j:7687
  NEO4J_USER: neo4j
  NEO4J_PASSWORD: ${NEO4J_PASSWORD}

x-ai-env: &ai-env
  LLM_PROVIDER: ${LLM_PROVIDER:-gemini}
  GEMINI_API_KEY: ${GEMINI_API_KEY}
  OPENAI_API_KEY: ${OPENAI_API_KEY:-}
  ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
  EMBEDDING_MODEL: ${EMBEDDING_MODEL:-sentence-transformers/all-MiniLM-L6-v2}

x-common-env: &common-env
  <<: [*postgres-env, *redis-env, *rabbitmq-env, *minio-env, *opensearch-env, *qdrant-env, *neo4j-env, *ai-env]
  ENVIRONMENT: production
  LOG_LEVEL: ${LOG_LEVEL:-INFO}
  JWT_SECRET: ${JWT_SECRET}
  JWT_ALGORITHM: HS256
  JWT_ACCESS_EXPIRE_MINUTES: "60"
  JWT_REFRESH_EXPIRE_DAYS: "30"
  API_GATEWAY_URL: http://api-gateway:8000

# ─── Restart and resource limits for production ────────────
x-svc-defaults: &svc-defaults
  restart: always
  logging:
    driver: "json-file"
    options:
      max-size: "100m"
      max-file: "5"

services:
  # ──────────────────────────────────────────
  # INFRASTRUCTURE
  # ──────────────────────────────────────────
  postgres:
    <<: *svc-defaults
    image: postgres:16-alpine
    container_name: tenderos-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tenderos}
      POSTGRES_USER: ${POSTGRES_USER:-tenderos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/postgres/init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
    ports:
      - "127.0.0.1:5432:5432"   # Bind to localhost only in production
    networks:
      - tenderos-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tenderos -d tenderos"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    <<: *svc-defaults
    image: redis:7-alpine
    container_name: tenderos-redis
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"
    networks:
      - tenderos-net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      retries: 5

  rabbitmq:
    <<: *svc-defaults
    image: rabbitmq:3.13-management-alpine
    container_name: tenderos-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-tenderos}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
      RABBITMQ_DEFAULT_VHOST: tenderos
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    ports:
      - "127.0.0.1:5672:5672"
      - "127.0.0.1:15672:15672"
    networks:
      - tenderos-net
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 30s
      retries: 3

  minio:
    <<: *svc-defaults
    image: minio/minio:latest
    container_name: tenderos-minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - minio_data:/data
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    command: server /data --console-address ":9001"
    networks:
      - tenderos-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      retries: 3

  opensearch:
    <<: *svc-defaults
    image: opensearchproject/opensearch:2.14.0
    container_name: tenderos-opensearch
    environment:
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - "OPENSEARCH_JAVA_OPTS=-Xms2g -Xmx2g"
      - plugins.security.disabled=true
    ulimits:
      memlock: { soft: -1, hard: -1 }
      nofile: { soft: 65536, hard: 65536 }
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    ports:
      - "127.0.0.1:9200:9200"
    networks:
      - tenderos-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health"]
      interval: 30s
      retries: 5

  qdrant:
    <<: *svc-defaults
    image: qdrant/qdrant:v1.9.0
    container_name: tenderos-qdrant
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - "127.0.0.1:6333:6333"
    networks:
      - tenderos-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 30s
      retries: 5

  neo4j:
    <<: *svc-defaults
    image: neo4j:5.20-community
    container_name: tenderos-neo4j
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*"
      NEO4J_dbms_memory_heap_initial__size: "512m"
      NEO4J_dbms_memory_heap_max__size: "1G"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    ports:
      - "127.0.0.1:7474:7474"
      - "127.0.0.1:7687:7687"
    networks:
      - tenderos-net
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:7474 || exit 1"]
      interval: 30s
      retries: 5

  # ──────────────────────────────────────────
  # MONITORING
  # ──────────────────────────────────────────
  prometheus:
    <<: *svc-defaults
    image: prom/prometheus:v2.52.0
    container_name: tenderos-prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
    volumes:
      - ./infrastructure/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "127.0.0.1:9090:9090"
    networks:
      - tenderos-net

  grafana:
    <<: *svc-defaults
    image: grafana/grafana:10.4.0
    container_name: tenderos-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-tenderos_grafana_prod}
      GF_SERVER_ROOT_URL: https://grafana.tenderos.in
    volumes:
      - ./infrastructure/monitoring/grafana-dashboards.json:/etc/grafana/provisioning/dashboards/tenderos.json:ro
    ports:
      - "127.0.0.1:3001:3000"
    networks:
      - tenderos-net
    depends_on:
      - prometheus

  # ──────────────────────────────────────────
  # APPLICATION SERVICES
  # ──────────────────────────────────────────
  api-gateway:
    <<: *svc-defaults
    build:
      context: ./services/api-gateway
      dockerfile: Dockerfile
    image: tenderos/api-gateway:1.0.0
    container_name: tenderos-api-gateway
    environment:
      <<: *common-env
      SERVICE_PORT: "8000"
      CORS_ORIGINS: ${CORS_ORIGINS}
    ports:
      - "8000:8000"
    networks:
      - tenderos-net
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      retries: 3

  auth-service:
    <<: *svc-defaults
    build:
      context: ./services/auth-service
      dockerfile: Dockerfile
    image: tenderos/auth-service:1.0.0
    container_name: tenderos-auth
    environment:
      <<: *common-env
      SERVICE_PORT: "8001"
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      MICROSOFT_CLIENT_ID: ${MICROSOFT_CLIENT_ID:-}
      MICROSOFT_CLIENT_SECRET: ${MICROSOFT_CLIENT_SECRET:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      FROM_EMAIL: ${FROM_EMAIL:-noreply@tenderos.in}
    ports:
      - "127.0.0.1:8001:8001"
    networks:
      - tenderos-net
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }

  tender-service:
    <<: *svc-defaults
    build:
      context: ./services/tender-service
      dockerfile: Dockerfile
    image: tenderos/tender-service:1.0.0
    container_name: tenderos-tender
    environment:
      <<: *common-env
      SERVICE_PORT: "8002"
    ports:
      - "127.0.0.1:8002:8002"
    networks:
      - tenderos-net
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }

  connector-service:
    <<: *svc-defaults
    build:
      context: ./services/connector-service
      dockerfile: Dockerfile
    image: tenderos/connector-service:1.0.0
    container_name: tenderos-connector
    environment:
      <<: *common-env
      SERVICE_PORT: "8003"
      GEM_API_KEY: ${GEM_API_KEY:-}
      GEM_API_BASE: ${GEM_API_BASE:-https://gem.gov.in/api}
      CPPP_BASE_URL: ${CPPP_BASE_URL:-https://eprocure.gov.in}
      CRAWLER_MAX_CONCURRENT: "5"
      CRAWLER_RATE_LIMIT_RPS: "2"
    ports:
      - "127.0.0.1:8003:8003"
    networks:
      - tenderos-net
    depends_on:
      rabbitmq: { condition: service_healthy }
      redis: { condition: service_healthy }

  scheduler-service:
    <<: *svc-defaults
    build:
      context: ./services/scheduler-service
      dockerfile: Dockerfile
    image: tenderos/scheduler-service:1.0.0
    container_name: tenderos-scheduler
    environment:
      <<: *common-env
      SERVICE_PORT: "8004"
    ports:
      - "127.0.0.1:8004:8004"
    networks:
      - tenderos-net
    depends_on:
      rabbitmq: { condition: service_healthy }
      redis: { condition: service_healthy }

  document-pipeline:
    <<: *svc-defaults
    build:
      context: ./services/document-pipeline
      dockerfile: Dockerfile
    image: tenderos/document-pipeline:1.0.0
    container_name: tenderos-doc-pipeline
    environment:
      <<: *common-env
      SERVICE_PORT: "8005"
    ports:
      - "127.0.0.1:8005:8005"
    networks:
      - tenderos-net
    depends_on:
      minio: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }

  ocr-service:
    <<: *svc-defaults
    build:
      context: ./services/ocr-service
      dockerfile: Dockerfile
    image: tenderos/ocr-service:1.0.0
    container_name: tenderos-ocr
    environment:
      <<: *common-env
      SERVICE_PORT: "8006"
      OCR_WORKERS: "2"
    ports:
      - "127.0.0.1:8006:8006"
    networks:
      - tenderos-net
    depends_on:
      - minio

  ai-extraction:
    <<: *svc-defaults
    build:
      context: ./services/ai-extraction
      dockerfile: Dockerfile
    image: tenderos/ai-extraction:1.0.0
    container_name: tenderos-ai-extraction
    environment:
      <<: *common-env
      SERVICE_PORT: "8007"
      EXTRACTION_CACHE_TTL: "604800"
    ports:
      - "127.0.0.1:8007:8007"
    networks:
      - tenderos-net
    depends_on:
      redis: { condition: service_healthy }

  classification-service:
    <<: *svc-defaults
    build:
      context: ./services/classification-service
      dockerfile: Dockerfile
    image: tenderos/classification-service:1.0.0
    container_name: tenderos-classification
    environment:
      <<: *common-env
      SERVICE_PORT: "8008"
    ports:
      - "127.0.0.1:8008:8008"
    networks:
      - tenderos-net

  knowledge-graph-service:
    <<: *svc-defaults
    build:
      context: ./services/knowledge-graph-service
      dockerfile: Dockerfile
    image: tenderos/knowledge-graph-service:1.0.0
    container_name: tenderos-graph
    environment:
      <<: *common-env
      SERVICE_PORT: "8009"
    ports:
      - "127.0.0.1:8009:8009"
    networks:
      - tenderos-net
    depends_on:
      neo4j: { condition: service_healthy }

  search-service:
    <<: *svc-defaults
    build:
      context: ./services/search-service
      dockerfile: Dockerfile
    image: tenderos/search-service:1.0.0
    container_name: tenderos-search
    environment:
      <<: *common-env
      SERVICE_PORT: "8010"
      SEARCH_RESULT_CACHE_TTL: "300"
    ports:
      - "127.0.0.1:8010:8010"
    networks:
      - tenderos-net
    depends_on:
      opensearch: { condition: service_healthy }
      qdrant: { condition: service_healthy }

  copilot-service:
    <<: *svc-defaults
    build:
      context: ./services/copilot-service
      dockerfile: Dockerfile
    image: tenderos/copilot-service:1.0.0
    container_name: tenderos-copilot
    environment:
      <<: *common-env
      SERVICE_PORT: "8011"
      RAG_CHUNK_SIZE: "512"
      RAG_CHUNK_OVERLAP: "50"
      RAG_TOP_K: "5"
    ports:
      - "127.0.0.1:8011:8011"
    networks:
      - tenderos-net
    depends_on:
      qdrant: { condition: service_healthy }

  digital-twin-service:
    <<: *svc-defaults
    build:
      context: ./services/digital-twin-service
      dockerfile: Dockerfile
    image: tenderos/digital-twin-service:1.0.0
    container_name: tenderos-digital-twin
    environment:
      <<: *common-env
      SERVICE_PORT: "8012"
    ports:
      - "127.0.0.1:8012:8012"
    networks:
      - tenderos-net
    depends_on:
      postgres: { condition: service_healthy }

  bid-qualification-service:
    <<: *svc-defaults
    build:
      context: ./services/bid-qualification-service
      dockerfile: Dockerfile
    image: tenderos/bid-qualification-service:1.0.0
    container_name: tenderos-bid-qual
    environment:
      <<: *common-env
      SERVICE_PORT: "8013"
    ports:
      - "127.0.0.1:8013:8013"
    networks:
      - tenderos-net
    depends_on:
      postgres: { condition: service_healthy }

  market-intelligence-service:
    <<: *svc-defaults
    build:
      context: ./services/market-intelligence-service
      dockerfile: Dockerfile
    image: tenderos/market-intelligence-service:1.0.0
    container_name: tenderos-market-intel
    environment:
      <<: *common-env
      SERVICE_PORT: "8014"
    ports:
      - "127.0.0.1:8014:8014"
    networks:
      - tenderos-net

  prediction-service:
    <<: *svc-defaults
    build:
      context: ./services/prediction-service
      dockerfile: Dockerfile
    image: tenderos/prediction-service:1.0.0
    container_name: tenderos-prediction
    environment:
      <<: *common-env
      SERVICE_PORT: "8015"
    ports:
      - "127.0.0.1:8015:8015"
    networks:
      - tenderos-net

  competitor-service:
    <<: *svc-defaults
    build:
      context: ./services/competitor-service
      dockerfile: Dockerfile
    image: tenderos/competitor-service:1.0.0
    container_name: tenderos-competitor
    environment:
      <<: *common-env
      SERVICE_PORT: "8016"
    ports:
      - "127.0.0.1:8016:8016"
    networks:
      - tenderos-net

  proposal-service:
    <<: *svc-defaults
    build:
      context: ./services/proposal-service
      dockerfile: Dockerfile
    image: tenderos/proposal-service:1.0.0
    container_name: tenderos-proposal
    environment:
      <<: *common-env
      SERVICE_PORT: "8017"
    ports:
      - "127.0.0.1:8017:8017"
    networks:
      - tenderos-net

  notification-service:
    <<: *svc-defaults
    build:
      context: ./services/notification-service
      dockerfile: Dockerfile
    image: tenderos/notification-service:1.0.0
    container_name: tenderos-notification
    environment:
      <<: *common-env
      SERVICE_PORT: "8018"
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      FROM_EMAIL: ${FROM_EMAIL:-alerts@tenderos.in}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
      TWILIO_FROM_NUMBER: ${TWILIO_FROM_NUMBER:-}
      WEBHOOK_MAX_RETRIES: "3"
    ports:
      - "127.0.0.1:8018:8018"
    networks:
      - tenderos-net

  admin-service:
    <<: *svc-defaults
    build:
      context: ./services/admin-service
      dockerfile: Dockerfile
    image: tenderos/admin-service:1.0.0
    container_name: tenderos-admin
    environment:
      <<: *common-env
      SERVICE_PORT: "8019"
    ports:
      - "127.0.0.1:8019:8019"
    networks:
      - tenderos-net

  billing-service:
    <<: *svc-defaults
    build:
      context: ./services/billing-service
      dockerfile: Dockerfile
    image: tenderos/billing-service:1.0.0
    container_name: tenderos-billing
    environment:
      <<: *common-env
      SERVICE_PORT: "8020"
      STRIPE_API_KEY: ${STRIPE_API_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      STRIPE_PRICE_SME: ${STRIPE_PRICE_SME}
      STRIPE_PRICE_ENTERPRISE: ${STRIPE_PRICE_ENTERPRISE}
      FRONTEND_URL: ${NEXT_PUBLIC_APP_URL}
    ports:
      - "127.0.0.1:8020:8020"
    networks:
      - tenderos-net
    depends_on:
      postgres: { condition: service_healthy }

  governance-service:
    <<: *svc-defaults
    build:
      context: ./services/governance-service
      dockerfile: Dockerfile
    image: tenderos/governance-service:1.0.0
    container_name: tenderos-governance
    environment:
      <<: *common-env
      SERVICE_PORT: "8021"
    ports:
      - "127.0.0.1:8021:8021"
    networks:
      - tenderos-net

  data-quality-service:
    <<: *svc-defaults
    build:
      context: ./services/data-quality-service
      dockerfile: Dockerfile
    image: tenderos/data-quality-service:1.0.0
    container_name: tenderos-data-quality
    environment:
      <<: *common-env
      SERVICE_PORT: "8022"
    ports:
      - "127.0.0.1:8022:8022"
    networks:
      - tenderos-net

  # ──────────────────────────────────────────
  # FRONTEND (Next.js — Static + SSR)
  # ──────────────────────────────────────────
  frontend:
    <<: *svc-defaults
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
    image: tenderos/frontend:1.0.0
    container_name: tenderos-frontend
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
    ports:
      - "3000:3000"
    networks:
      - tenderos-net
    depends_on:
      api-gateway: { condition: service_healthy }
