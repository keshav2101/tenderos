version: "3.9"

# TenderOS Infrastructure Services — Databases, Message Broker, Object Storage
# Run independently for development: docker-compose -f docker-compose.infra.yml up -d

networks:
  tenderos-net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  minio_data:
  opensearch_data:
  qdrant_data:
  neo4j_data:
  neo4j_logs:

services:
  # ─────────────────────────────────────────────
  # PostgreSQL — Primary relational database
  # ─────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: tenderos-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: tenderos
      POSTGRES_USER: tenderos
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tenderos_dev_password}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    networks:
      - tenderos-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tenderos -d tenderos"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────
  # Redis — Cache, rate limiting, session store
  # ─────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: tenderos-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-tenderos_redis_dev} --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - tenderos-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────
  # RabbitMQ — Message broker for pipeline tasks
  # ─────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: tenderos-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: tenderos
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-tenderos_rabbit_dev}
      RABBITMQ_DEFAULT_VHOST: tenderos
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    ports:
      - "5672:5672"    # AMQP
      - "15672:15672"  # Management UI
    networks:
      - tenderos-net
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 30s
      timeout: 30s
      retries: 3

  # ─────────────────────────────────────────────
  # MinIO — S3-compatible object storage for tender documents
  # ─────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: tenderos-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-tenderos_minio}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-tenderos_minio_secret_dev}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"   # API
      - "9001:9001"   # Console
    command: server /data --console-address ":9001"
    networks:
      - tenderos-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # ─────────────────────────────────────────────
  # OpenSearch — Hybrid BM25 + vector search
  # ─────────────────────────────────────────────
  opensearch:
    image: opensearchproject/opensearch:2.14.0
    container_name: tenderos-opensearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - "OPENSEARCH_JAVA_OPTS=-Xms1g -Xmx1g"
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=${OPENSEARCH_PASSWORD:-TenderOS_Admin@123}
      - plugins.security.disabled=true  # Disable for local dev only
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    ports:
      - "9200:9200"
      - "9600:9600"
    networks:
      - tenderos-net
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\\|yellow\"'"]
      interval: 30s
      timeout: 10s
      retries: 5

  # OpenSearch Dashboards (dev only)
  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:2.14.0
    container_name: tenderos-opensearch-dashboards
    restart: unless-stopped
    environment:
      OPENSEARCH_HOSTS: '["http://opensearch:9200"]'
      DISABLE_SECURITY_DASHBOARDS_PLUGIN: "true"
    ports:
      - "5601:5601"
    networks:
      - tenderos-net
    depends_on:
      - opensearch
    profiles:
      - dev-tools

  # ─────────────────────────────────────────────
  # Qdrant — Vector database for semantic search + RAG
  # ─────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.9.0
    container_name: tenderos-qdrant
    restart: unless-stopped
    environment:
      QDRANT__SERVICE__API_KEY: ${QDRANT_API_KEY:-tenderos_qdrant_dev}
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - "6333:6333"  # REST API
      - "6334:6334"  # gRPC
    networks:
      - tenderos-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ─────────────────────────────────────────────
  # Neo4j — Knowledge Graph database
  # ─────────────────────────────────────────────
  neo4j:
    image: neo4j:5.20-community
    container_name: tenderos-neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-tenderos_neo4j_dev}
      NEO4J_PLUGINS: '["apoc", "graph-data-science"]'
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*,gds.*"
      NEO4J_dbms_memory_heap_initial__size: 512m
      NEO4J_dbms_memory_heap_max__size: 1G
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    ports:
      - "7474:7474"  # Browser
      - "7687:7687"  # Bolt
    networks:
      - tenderos-net
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
